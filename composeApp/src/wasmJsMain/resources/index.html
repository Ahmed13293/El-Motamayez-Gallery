<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة المتميز</title>
    <!-- PWA manifest (required for iOS Safari push notifications) -->
    <link rel="manifest" href="manifest.json">
    <!-- iOS Safari PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="المتميز">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=block" rel="stylesheet">
    <!-- Firebase Web SDK for push notifications -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script>
      window._fcmToken = "";
      // Set by service worker message or URL param when opened from a notification
      window._pendingNavigation = new URLSearchParams(window.location.search).get('navigate') || "";
      // iOS Safari detection — push only works as PWA (added to Home Screen)
      window._isIosSafari = /iphone|ipad|ipod/i.test(navigator.userAgent) &&
          !/crios|fxios/i.test(navigator.userAgent);
      window._isStandalone = window.navigator.standalone === true;

      // Stable device ID persisted in localStorage — one row per browser profile in push_tokens
      window._getDeviceId = function() {
        let id = localStorage.getItem('_fcm_device_id');
        if (!id) {
          id = (crypto.randomUUID ? crypto.randomUUID() : 'web-' + Date.now() + '-' + Math.random().toString(36).slice(2));
          localStorage.setItem('_fcm_device_id', id);
        }
        return id;
      };

      // Called by Kotlin after login so the permission request is tied to a user action
      window.initFcmPush = async function() {
        if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
        if (window._fcmToken) return; // already done
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp({
              apiKey: "AIzaSyD5T5Rw7VfoWP3A2PhDqaqrOH9oEtaEtzc",
              authDomain: "el-motamayz-library.firebaseapp.com",
              projectId: "el-motamayz-library",
              storageBucket: "el-motamayz-library.firebasestorage.app",
              messagingSenderId: "1013516234653",
              appId: "1:1013516234653:web:4755d52ca8c8cae54c8974",
            });
          }
          const messaging = firebase.messaging();
          // Use a path relative to the page so it works at any deployment sub-path
          const swUrl = new URL('firebase-messaging-sw.js', location.href).href;
          const reg = await navigator.serviceWorker.register(swUrl, { scope: './' });
          const permission = await Notification.requestPermission();
          if (permission !== 'granted') return;
          const token = await messaging.getToken({
            vapidKey: 'BPYV8oJ0h5aXF1nxJaJDt8WdO0Xo0aeDHzCmvzKvD2zsChKVWN_xD7s_ZQFaISlkLg9muyDsF__5zvgGu2s0-W4',
            serviceWorkerRegistration: reg,
          });
          window._fcmToken = token || "";
          // Listen for messages from service worker (notification click)
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data?.navigateTo) window._pendingNavigation = event.data.navigateTo;
          });
          // Foreground message — show a browser notification
          messaging.onMessage((payload) => {
            const title = payload.notification?.title || 'مكتبة المتميز';
            const body  = payload.notification?.body  || '';
            if (Notification.permission === 'granted') {
              new Notification(title, { body, dir: 'rtl', lang: 'ar' });
            }
          });
        } catch (e) {
          console.warn('FCM init error:', e);
        }
      };

      // Try eagerly on page load for browsers that allow it (desktop Chrome, Firefox)
      window.initFcmPush();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #F0F4F8;
            font-family: 'Cairo', 'Segoe UI', 'Arial Unicode MS', sans-serif;
        }
        canvas { display: block; font-family: 'Cairo', 'Segoe UI', 'Arial Unicode MS', sans-serif; }
    </style>
</head>
<body>
    <canvas id="ComposeTarget"></canvas>
    <script>
        Promise.all([
            document.fonts.load("400 16px Cairo"),
            document.fonts.load("700 16px Cairo")
        ]).then(function() {
            var s = document.createElement("script");
            s.src = "composeApp.js";
            document.body.appendChild(s);
        }).catch(function() {
            var s = document.createElement("script");
            s.src = "composeApp.js";
            document.body.appendChild(s);
        });
    </script>
</body>
</html>
