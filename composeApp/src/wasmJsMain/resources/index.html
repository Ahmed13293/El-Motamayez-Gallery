<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة المتميز</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=block" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #F0F4F8;
            /* Setting Cairo as the page default makes the browser's canvas 2D
               font-family fallback resolve to Cairo for Arabic glyphs */
            font-family: 'Cairo', 'Segoe UI', 'Arial Unicode MS', sans-serif;
        }
        canvas { display: block; font-family: 'Cairo', 'Segoe UI', 'Arial Unicode MS', sans-serif; }
    </style>
</head>
<body>
    <canvas id="ComposeTarget"></canvas>
    <script>
        // Ensure Cairo (and Arabic glyph support) is fully loaded before
        // the Compose/Skiko canvas starts drawing the first frame.
        Promise.all([
            document.fonts.load("400 16px Cairo"),
            document.fonts.load("700 16px Cairo")
        ]).then(function() {
            var s = document.createElement("script");
            s.src = "composeApp.js";
            document.body.appendChild(s);
        }).catch(function() {
            // Font failed to load (e.g. offline) — start anyway with system fallback
            var s = document.createElement("script");
            s.src = "composeApp.js";
            document.body.appendChild(s);
        });
    </script>
</body>
</html>
